<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-7-8 Breathing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>4-7-8 Breathing</h1>
    <div class="breathing-card">
      <div class="ring-container">
        <div class="track"></div>
        <div id="dot" class="dot"></div>
      <div class="ring-label">
        <span id="phase-name" class="phase-main">INHALE</span>
        <span id="phase-subtitle" class="phase-sub">Breathe In</span>
        <strong id="remaining">4</strong>
        <span>seconds</span>
        <span id="cycle-count">Cycles: 0</span>
      </div>
      </div>

      <div class="controls">
        <button id="toggle-btn" class="toggle">Start</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
